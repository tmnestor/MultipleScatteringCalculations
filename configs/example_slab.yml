# Slab Foldy-Lax scattering configuration
# M×M×N_z lattice of cubes with elastic contrasts

device:
  backend: auto          # auto | mps | cuda | cpu
  dtype: auto            # auto | complex64 | complex128
  memory_limit_gb: 8.0

solver:
  gmres_tol: 1.0e-6
  max_iter: 500
  initial_guess: born    # born | zero

problem:
  type: slab

  geometry:
    M: 32                # Horizontal grid (M×M cubes per layer)
    N_z: 10              # Vertical layers
    a: 1.0               # Cube half-width (m), side length d = 2a

  reference:
    alpha: 5000.0        # P-wave velocity (m/s)
    beta: 3000.0         # S-wave velocity (m/s)
    rho: 2500.0          # Density (kg/m³)

  contrast:
    Dlambda: 2.0e9       # Lamé parameter contrast (Pa)
    Dmu: 1.0e9           # Shear modulus contrast (Pa)
    Drho: 100.0          # Density contrast (kg/m³)

  frequency:
    omega: 150.0         # Angular frequency (rad/s)

  incident:
    k_hat: [1.0, 0.0, 0.0]   # Propagation direction (z, x, y)
    wave_type: P              # P or S

  slab:
    material_type: random     # random | uniform
    phi: 0.1                  # Volume fraction (random only)
    seed: 42                  # RNG seed (random only)
